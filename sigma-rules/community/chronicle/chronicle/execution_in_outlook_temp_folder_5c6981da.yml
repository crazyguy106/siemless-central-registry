title: execution_in_outlook_temp_folder
id: 8f49ec46-a22a-4e0a-b528-59d72fb87c14
status: experimental
level: medium
description: |
  Detects a suspicious program execution in Outlook temp folder  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.
author: Florian Roth
logsource:
  product: chronicle
  service: general
detection:
  _yaral_rule: |
    rule execution_in_outlook_temp_folder {
 meta:
    author = "Florian Roth"
    description = "Detects a suspicious program execution in Outlook temp folder  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md."
    reference = "https://tdm.socprime.com/tdm/info/TTOs3evZRJww"
    version = "0.01"
    created = "2019/10/01"
    category = "process_creation"
    product = "windows"
    mitre = "initial_access, t1193"

  events:
(re.regex($selection.target.process.file.full_path, `.*\\Temporary Internet Files\\Content\.Outlook\\.*`) and ($selection.metadata.product_event_type = "4688" or $selection.metadata.product_event_type = "1"))

  condition:
    $selection
}

  condition: _yaral_rule
references:
  - https://tdm.socprime.com/tdm/info/TTOs3evZRJww
tags:


