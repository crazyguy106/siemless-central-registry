title: mavinject_process_injection
id: ff3e42c2-5dc0-4edf-aa04-ee3c5f129849
status: experimental
level: medium
description: |
  Detects process injection using the signed Windows tool Mavinject32.exe  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.
author: Florian Roth
logsource:
  product: chronicle
  service: general
detection:
  _yaral_rule: |
    rule mavinject_process_injection {
 meta:
    author = "Florian Roth"
    description = "Detects process injection using the signed Windows tool Mavinject32.exe  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md."
    reference = "https://tdm.socprime.com/tdm/info/4TmhnXxVIPh5"
    version = "0.01"
    created = "2018/12/12"
    category = "process_creation"
    product = "windows"
    mitre = "process_injection, t1055, signed_binary_proxy_execution, t1218"

  events:
(re.regex($selection.target.process.command_line, `.* /INJECTRUNNING .*`) and ($selection.metadata.product_event_type = "4688" or $selection.metadata.product_event_type = "1"))

  condition:
    $selection
}

  condition: _yaral_rule
references:
  - https://tdm.socprime.com/tdm/info/4TmhnXxVIPh5
tags:


