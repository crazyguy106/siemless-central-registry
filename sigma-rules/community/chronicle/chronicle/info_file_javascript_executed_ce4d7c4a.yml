rule info_file_javascript_executed
{
  meta:
    author = "Google Cloud Security"
    description = "JavaScript (.js, .jse) execution"
    yara_version = "YL2.0"
    rule_version = "1.0"

  events:
    $e1.metadata.event_type = "PROCESS_LAUNCH"
    re.regex($e1.principal.process.command_line, `\.jse?$`) nocase

  condition:
    $e1
}

  condition: _yaral_rule
