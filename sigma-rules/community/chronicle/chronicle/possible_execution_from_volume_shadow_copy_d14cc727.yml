title: possible_execution_from_volume_shadow_copy
id: 8017bb1e-cb15-472d-a6ee-98ebdf0a1238
status: experimental
level: medium
description: |
  DELETE delete double quotes in search (ELK or Graylog)! Detects suspicious execution from shadow copy.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.
author: Roman Ranskyi, SBousseaden
logsource:
  product: chronicle
  service: general
detection:
  _yaral_rule: |
    rule possible_execution_from_volume_shadow_copy {
 meta:
    author = "Roman Ranskyi, SBousseaden"
    description = "DELETE delete double quotes in search (ELK or Graylog)! Detects suspicious execution from shadow copy.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md."
    reference = "https://tdm.socprime.com/tdm/info/MYxVDBxNBI8g"
    version = "0.01"
    created = "2019/05/28"
    product = "windows"
    service = "sysmon"
    mitre = "defense_evasion"

  events:
(re.regex($selection0.target.process.file.full_path, `HarddiskVolumeShadowCopy.*`) or re.regex($selection0.target.process.command_line, `HarddiskVolumeShadowCopy.*`))

  condition:
    $selection0
}

  condition: _yaral_rule
references:
  - https://tdm.socprime.com/tdm/info/MYxVDBxNBI8g
