title: detect_when_the_guest_account_is_enabled
id: 8c11cb29-822c-4986-928c-c3c2b7bfd702
status: experimental
level: medium
description: |
  This rule detects when the guest account in windows Operating system is enabled, its best practise to disable the account since it has no password.Attempts to enable it should be investigated  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.
author: Joseph Kamau
logsource:
  product: chronicle
  service: general
detection:
  _yaral_rule: |
    rule detect_when_the_guest_account_is_enabled {
 meta:
    author = "Joseph Kamau"
    description = "This rule detects when the guest account in windows Operating system is enabled, its best practise to disable the account since it has no password.Attempts to enable it should be investigated  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md."
    reference = "https://tdm.socprime.com/tdm/info/We4KiQFjMbik"
    version = "0.01"
    created = "2021-03-09"
    product = "Windows"
    service = "security"
    mitre = "defense_evasion, t1078"

  events:
($selection.metadata.product_event_type = "4722" and ($selection.principal.user.user_display_name = "guest" or $selection.principal.user.user_display_name = "Guest"))

  condition:
    $selection
}

  condition: _yaral_rule
references:
  - https://tdm.socprime.com/tdm/info/We4KiQFjMbik
tags:


