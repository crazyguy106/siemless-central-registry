title: rdp_hijacking_terminal_services__manipulation
id: 059a362d-718e-4a09-8d46-12027a1791d9
status: experimental
level: medium
description: |
  Detects Terminal Services  Manipulation.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.
