title: suspicious_execute_remote_cscript
id: 7de9da4e-7f33-4e39-a26c-19c696bac8d6
status: experimental
level: medium
description: |
  One-liner execution of a cscript/wscript from a network share
author: Google Cloud Security
logsource:
  product: chronicle
  service: general
detection:
  _yaral_rule: |
    /*
