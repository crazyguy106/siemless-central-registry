rule suspicious_execute_remote_cscript
{
  meta:
    author = "Google Cloud Security"
    description = "One-liner execution of a cscript/wscript from a network share"
    reference = "https://github.com/swisskyrepo/PayloadsAllTheThings/blob/master/Methodology%20and%20Resources/Windows%20-%20Download%20and%20Execute.md"
    yara_version = "YL2.0"
    rule_version = "1.0"

  events:
    re.regex($e1.principal.process.command_line, `\bcscript(\.exe)?\s+.*//.*jscript.*\\`) nocase

  condition:
    $e1
}

  condition: _yaral_rule
references:
  - https://github.com/swisskyrepo/PayloadsAllTheThings/blob/master/Methodology%20and%20Resources/Windows%20-%20Download%20and%20Execute.md
tags:


