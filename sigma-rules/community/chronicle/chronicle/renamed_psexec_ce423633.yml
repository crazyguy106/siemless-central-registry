title: renamed_psexec
id: ccf6198b-345b-428a-835a-8b26358754b4
status: experimental
level: medium
description: |
  Detects the execution of a renamed PsExec often used by attackers or malware  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.
author: Florian Roth
logsource:
  product: chronicle
  service: general
detection:
  _yaral_rule: |
    rule renamed_psexec {
 meta:
    author = "Florian Roth"
    description = "Detects the execution of a renamed PsExec often used by attackers or malware  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md."
    reference = "https://tdm.socprime.com/tdm/info/QOSajcAZW9Ds"
    version = "0.01"
    created = "2019/05/21"
    product = "windows"
    service = "sysmon"
    mitre = "car.2013-05-009"

  events:
(($selection.metadata.description = "Execute processes remotely" and $selection.metadata.product_name = "Sysinternals PsExec") and not ((re.regex($selection.target.process.file.full_path, `.*\\PsExec\.exe`) or re.regex($selection.target.process.file.full_path, `.*\\PsExec64\.exe`))))

  condition:
    $selection
}

  condition: _yaral_rule
references:
  - https://tdm.socprime.com/tdm/info/QOSajcAZW9Ds
tags:


