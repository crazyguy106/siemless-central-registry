title: disable_services_startup_detected
id: a1d2d39f-fd62-4a51-9f29-f9ff94c6bc5b
status: experimental
level: medium
description: |
  A process attempted to disable a common security related service from starting at system boot.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.
author: Furkan Celik
logsource:
  product: chronicle
  service: general
detection:
  _yaral_rule: |
    rule disable_services_startup_detected {
 meta:
    author = "Furkan Celik"
    description = "A process attempted to disable a common security related service from starting at system boot.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md."
    reference = "https://tdm.socprime.com/tdm/info/ie8i7NI6fJ5S"
    version = "0.01"
    created = "2020/04/17"
    product = "windows"
    service = "powershell"
    mitre = "execution, defense_evasion, t1204, t1059"

  events:
($selection.target.process.command_line = "cmd.exe /c sc stop wuauserv" or $selection.target.process.command_line = "stop wuauserv")

  condition:
    $selection
}

  condition: _yaral_rule
references:
  - https://tdm.socprime.com/tdm/info/ie8i7NI6fJ5S
