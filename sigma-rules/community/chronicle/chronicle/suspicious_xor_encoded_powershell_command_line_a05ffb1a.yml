title: suspicious_xor_encoded_powershell_command_line
id: 875e7ed3-5d39-43df-b71d-44f5637df187
status: experimental
level: medium
description: |
  Detects suspicious powershell process which includes bxor command, alternatvide obfuscation method to b64 encoded commands.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.
author: Sami Ruohonen
logsource:
  product: chronicle
  service: general
detection:
  _yaral_rule: |
    rule suspicious_xor_encoded_powershell_command_line {
 meta:
    author = "Sami Ruohonen"
    description = "Detects suspicious powershell process which includes bxor command, alternatvide obfuscation method to b64 encoded commands.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md."
    reference = "https://tdm.socprime.com/tdm/info/z7Wd6yerF4gU"
    version = "0.01"
    created = "2018/09/05"
    category = "process_creation"
    product = "windows"
    mitre = "execution, t1086"

  events:
(re.regex($selection.target.process.command_line, `.* -bxor.*`) and ($selection.metadata.product_event_type = "4688" or $selection.metadata.product_event_type = "1"))

  condition:
    $selection
}

  condition: _yaral_rule
references:
  - https://tdm.socprime.com/tdm/info/z7Wd6yerF4gU
tags:


