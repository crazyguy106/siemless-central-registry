title: apt29_part_1
id: 3dfc8f72-3db0-4d8d-b00f-45029306ca70
status: experimental
level: medium
description: |
  This method detects a suspicious powershell command line combination as used by APT29 in a campaign against US think tanks  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.
author: Florian Roth
logsource:
  product: chronicle
  service: general
detection:
  _yaral_rule: |
    rule apt29_part_1 {
 meta:
    author = "Florian Roth"
    description = "This method detects a suspicious powershell command line combination as used by APT29 in a campaign against US think tanks  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md."
    reference = "https://tdm.socprime.com/tdm/info/EID3KC4B5JxZ"
    version = "0.01"
    created = "2018/12/04"
    product = "windows"
    service = "security"
    mitre = "Execution, t1086"

  events:
($selection.metadata.product_event_type = "4688" and re.regex($selection.target.process.command_line, `.*-noni -ep bypass $.*`))

  condition:
    $selection
}

  condition: _yaral_rule
references:
  - https://tdm.socprime.com/tdm/info/EID3KC4B5JxZ
tags:


