title: wmiexec_vbs_script
id: ef6bf571-74b8-42d8-9d64-7553229303fc
status: experimental
level: medium
description: |
  Detects suspicious file execution by wscript and cscript  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.
author: Florian Roth
logsource:
  product: chronicle
  service: general
detection:
  _yaral_rule: |
    rule wmiexec_vbs_script {
 meta:
    author = "Florian Roth"
    description = "Detects suspicious file execution by wscript and cscript  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md."
    reference = "https://tdm.socprime.com/tdm/info/NRzdC2mfrIv4"
    version = "0.01"
    created = "2021-03-09"
    product = "windows"
    service = "sysmon"
    mitre = "execution, g0045, t1064"

  events:
($selection.metadata.product_event_type = "1" and re.regex($selection.target.process.file.full_path, `.*\\cscript\.exe`) and re.regex($selection.target.process.command_line, `.*\.vbs /shell .*`))

  condition:
    $selection
}

  condition: _yaral_rule
references:
  - https://tdm.socprime.com/tdm/info/NRzdC2mfrIv4
tags:


