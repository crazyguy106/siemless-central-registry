title: bcdedit_off_sysmon
id: 7154691b-d19a-4fbc-bd99-c7ccf36417d9
status: experimental
level: medium
description: |
  Detects usage of bcdedit off.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.
author: Michael Haag, Alexandr Yampolskyi
logsource:
  product: chronicle
  service: general
detection:
  _yaral_rule: |
    rule bcdedit_off_sysmon {
 meta:
    author = "Michael Haag, Alexandr Yampolskyi"
    description = "Detects usage of bcdedit off.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md."
    reference = "https://tdm.socprime.com/tdm/info/zyBp9FExBB8I"
    version = "0.01"
    created = "2021-03-09"
    product = "windows"
    service = "sysmon"
    mitre = "Execution, t1204, t1059"

  events:
($selection.metadata.product_event_type = "1" and $selection.target.process.file.full_path = "bcdedit.exe" and re.regex($selection.target.process.command_line, `.*off`))

  condition:
    $selection
}

  condition: _yaral_rule
references:
  - https://tdm.socprime.com/tdm/info/zyBp9FExBB8I
tags:


