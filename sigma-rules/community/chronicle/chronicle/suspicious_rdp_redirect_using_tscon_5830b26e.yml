title: suspicious_rdp_redirect_using_tscon
id: fb8e4a64-9c50-4c6e-99e8-84a04784e6e6
status: experimental
level: medium
description: |
  Detects a suspicious RDP session redirect using tscon.exe  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.
author: Florian Roth
logsource:
  product: chronicle
  service: general
detection:
  _yaral_rule: |
    rule suspicious_rdp_redirect_using_tscon {
 meta:
    author = "Florian Roth"
    description = "Detects a suspicious RDP session redirect using tscon.exe  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md."
    reference = "https://tdm.socprime.com/tdm/info/Q2ta1itwSt1J"
    version = "0.01"
    created = "2018/03/17"
    category = "process_creation"
    product = "windows"

  events:
(re.regex($selection.target.process.command_line, `.* /dest:rdp-tcp:.*`) and ($selection.metadata.product_event_type = "4688" or $selection.metadata.product_event_type = "1"))

  condition:
    $selection
}

  condition: _yaral_rule
references:
  - https://tdm.socprime.com/tdm/info/Q2ta1itwSt1J
tags:


