title: bitsadmin_download_sysmon
id: e1a00454-f7b1-4ad2-bf1d-b3267c6cf92a
status: experimental
level: medium
description: |
  Detects usage of bitsadmin downloading a file.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md.
author: Michael Haag
logsource:
  product: chronicle
  service: general
detection:
  _yaral_rule: |
    rule bitsadmin_download_sysmon {
 meta:
    author = "Michael Haag"
    description = "Detects usage of bitsadmin downloading a file.  License: https://github.com/Neo23x0/sigma/blob/master/LICENSE.Detection.Rules.md."
    reference = "https://tdm.socprime.com/tdm/info/NkFX55P1CZVt"
    version = "0.01"
    created = "2021-03-09"
    product = "windows"
    service = "sysmon"
    mitre = "Execution, t1204, t1059"

  events:
($selection.metadata.product_event_type = "1" and re.regex($selection.target.process.file.full_path, `.*\\bitsadmin\.exe`) and (re.regex($selection.target.process.command_line, `.*/transfer`) or re.regex($selection.target.process.command_line, `.*/download`)))

  condition:
    $selection
}

  condition: _yaral_rule
references:
  - https://tdm.socprime.com/tdm/info/NkFX55P1CZVt
tags:


