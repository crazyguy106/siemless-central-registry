rule info_dns_lookup_exact
{
  meta:
    author = "Google Cloud Security"
    description = "DNS lookups of a full, exact address (e.g. accounts.google.com)"
    yara_version = "YL2.0"
    rule_version = "1.0"

  events:
    $e1.metadata.event_type = "NETWORK_DNS"
    $e1.network.dns.questions.name = `accounts\.google\.com`

  condition:
    $e1
}

  condition: _yaral_rule
