title: info_dns_lookup_exact
id: d67ca62a-5ea9-4c20-8773-e92f5b04d591
status: experimental
level: medium
description: |
  DNS lookups of a full, exact address (e.g. accounts.google.com)
author: Google Cloud Security
logsource:
  product: chronicle
  service: general
